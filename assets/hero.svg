<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Firstpass cuts your AI bill — from four dollar signs to one — at the same quality, guaranteed: it checks every answer and pays for a big model only when truly needed.</title>
  <defs>
    <linearGradient id="mintg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEACB"/><stop offset="1" stop-color="#19E3B1"/>
    </linearGradient>
    <radialGradient id="haze" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#19E3B1" stop-opacity="0.12"/><stop offset="1" stop-color="#19E3B1" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="am" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 Z" fill="url(#mintg)"/></marker>
  </defs>

  <rect x="1.5" y="1.5" width="997" height="357" rx="18" fill="#0B0E14" stroke="#263449"/>
  <ellipse cx="640" cy="170" rx="360" ry="170" fill="url(#haze)"/>

  <!-- brand -->
  <text x="36" y="46" font-size="19" font-weight="800" fill="#E6EDF3">⚡ firstpass</text>

  <!-- YOUR AI BILL: $$$$ struck out -->
  <text x="118" y="96" font-size="13" font-weight="700" fill="#8A97A6" letter-spacing="2">YOUR AI BILL</text>
  <text x="110" y="205" font-size="104" font-weight="900" fill="#4A5563">$$$$</text>
  <line x1="96" y1="172" x2="392" y2="172" stroke="#FF5C5C" stroke-width="7" stroke-linecap="round" transform="rotate(-7 244 172)"/>

  <!-- arrow -->
  <path d="M430 168 L540 168" stroke="url(#mintg)" stroke-width="9" stroke-linecap="round" marker-end="url(#am)" stroke-dasharray="16 12">
    <animate attributeName="stroke-dashoffset" from="28" to="0" dur="0.9s" repeatCount="indefinite"/>
  </path>

  <!-- the new bill: one $ -->
  <text x="588" y="212" font-size="130" font-weight="900" fill="url(#mintg)" filter="url(#g2)">$</text>

  <!-- shield: same quality, guaranteed -->
  <g filter="url(#g1)">
    <path d="M772 82 L830 100 L830 158 C830 196 800 220 772 230 C744 220 714 196 714 158 L714 100 Z"
          fill="#0c1614" stroke="#19E3B1" stroke-width="3"/>
    <path d="M744 156 L766 178 L802 130" fill="none" stroke="#19E3B1" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="860" y="142" font-size="24" font-weight="900" fill="#E6EDF3">SAME</text>
  <text x="860" y="172" font-size="24" font-weight="900" fill="#E6EDF3">QUALITY</text>
  <text x="860" y="200" font-size="16" font-weight="800" fill="#19E3B1">guaranteed</text>

  <!-- one plain-words line -->
  <line x1="36" y1="272" x2="964" y2="272" stroke="#1B2636"/>
  <text x="500" y="316" text-anchor="middle" font-size="21" font-weight="700" fill="#E6EDF3">It checks every answer — and pays for a big model <tspan fill="#19E3B1">only when truly needed</tspan>.</text>
  <text x="500" y="341" text-anchor="middle" font-size="12.5" fill="#8A97A6">≤10% wrong answers served, at 95% confidence — measured live, not promised · self-tuning</text>
</svg>

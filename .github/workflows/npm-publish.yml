name: npm-publish
# Publish the npm package via OIDC TRUSTED PUBLISHING — no token, no 2FA.
# cargo-dist generates the @dshakesnotbot/firstpass-proxy tarball as a release
# asset (npm is in `installers` but NOT `publish-jobs`); this job downloads it and
# pushes it to npm using the repo's OIDC identity.
#
# TRIGGER: `workflow_run` after the "Release" workflow finishes — NOT `release:
# published`. A release created by GITHUB_TOKEN (which cargo-dist uses) does NOT
# fire the `release` event — GitHub suppresses token-created events to avoid
# recursion, so a `release`-triggered job silently never runs. `workflow_run` fires
# regardless, so npm auto-publishes on every stable release with no manual step.
#
# One-time npm setup (npmjs.com → the package → Trusted Publisher → GitHub Actions):
#   Organization or user : dshakes
#   Repository           : firstpass
#   Workflow filename    : npm-publish.yml
#   Environment name     : (leave blank)
#   Allowed actions      : npm publish
# Then the NPM_TOKEN secret can be deleted — OIDC replaces it.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.2)"
        required: true

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # Manual dispatch, or after a SUCCESSFUL Release run on a stable v* tag (skip
    # rc/prereleases, which carry a '-' suffix — mirrors cargo-dist's brew/npm policy).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v') &&
      !contains(github.event.workflow_run.head_branch, '-')) }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Upgrade npm to an OIDC-capable version (>= 11.5.1)
        run: npm install -g npm@latest && npm --version
      - name: Download the npm package tarball from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.workflow_run.head_branch || github.event.inputs.tag }}
        run: |
          # workflow_run.head_branch is the tag for a tag-triggered Release; fall back
          # to the latest release if it isn't a resolvable tag.
          if [ -z "$TAG" ] || ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            TAG="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)"
          fi
          echo "publishing npm for release: $TAG"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*-npm-package.tar.gz' --dir .
          ls -la ./*-npm-package.tar.gz
      - name: Publish to npm
        # npm can't configure trusted publishing until the package EXISTS, so the
        # first publish needs a token (use a classic Automation token — it bypasses
        # 2FA). Once the package exists + a Trusted Publisher is configured, delete
        # the NPM_TOKEN secret and every future release publishes via OIDC (no token).
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TARBALL="$(ls ./*-npm-package.tar.gz)"
          if [ -n "$NPM_TOKEN" ]; then
            echo "bootstrap publish with NPM_TOKEN"
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          else
            echo "OIDC trusted publishing (no token)"
          fi
          npm publish "$TARBALL" --access public

<svg viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>How Firstpass works in four moves. 1 Route: open the cheapest rung of your model ladder. 2 Prove: a gate checks the actual output — your tests, a schema, or a judge. 3 Escalate: only on gate failure, one rung up, budget-capped. 4 Learn: outcomes feed back so the serve threshold self-tunes. The Learn step loops back to Route.</title>
  <defs>
    <marker id="w-arw" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3a4a5e"/></marker>
    <marker id="w-arm" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#19E3B1"/></marker>
  </defs>

  <rect x="1.5" y="1.5" width="997" height="247" rx="16" fill="#0B0E14" stroke="#243244"/>
  <text x="34" y="40" font-size="14.5" font-weight="700" fill="#E6EDF3">One request, four moves <tspan fill="#8A97A6" font-weight="400">— route → prove → escalate → learn</tspan></text>

  <!-- 1 Route -->
  <g>
    <rect x="34" y="66" width="212" height="110" rx="14" fill="#10151d" stroke="#19E3B1" stroke-width="1.6"/>
    <circle cx="66" cy="98" r="15" fill="#19E3B1"/>
    <text x="66" y="103" text-anchor="middle" fill="#04140f" font-size="14" font-weight="800">1</text>
    <text x="92" y="103" fill="#E6EDF3" font-size="17" font-weight="700">Route</text>
    <text x="56" y="136" fill="#8A97A6" font-size="12.5">open the cheapest</text>
    <text x="56" y="155" fill="#8A97A6" font-size="12.5">rung in the ladder</text>
  </g>
  <line x1="248" y1="121" x2="278" y2="121" stroke="#3a4a5e" stroke-width="1.8" marker-end="url(#w-arw)"/>

  <!-- 2 Prove -->
  <g>
    <rect x="280" y="66" width="212" height="110" rx="14" fill="#10151d" stroke="#19E3B1" stroke-width="1.6"/>
    <circle cx="312" cy="98" r="15" fill="#19E3B1"/>
    <text x="312" y="103" text-anchor="middle" fill="#04140f" font-size="14" font-weight="800">2</text>
    <text x="338" y="103" fill="#E6EDF3" font-size="17" font-weight="700">Prove</text>
    <text x="302" y="136" fill="#8A97A6" font-size="12.5">gate the real output</text>
    <text x="302" y="155" fill="#8A97A6" font-size="12.5">— tests, schema, judge</text>
  </g>
  <line x1="494" y1="121" x2="524" y2="121" stroke="#3a4a5e" stroke-width="1.8" marker-end="url(#w-arw)"/>

  <!-- 3 Escalate -->
  <g>
    <rect x="526" y="66" width="212" height="110" rx="14" fill="#10151d" stroke="#FF5C5C" stroke-width="1.6"/>
    <circle cx="558" cy="98" r="15" fill="#FF5C5C"/>
    <text x="558" y="103" text-anchor="middle" fill="#1a0808" font-size="14" font-weight="800">3</text>
    <text x="584" y="103" fill="#E6EDF3" font-size="17" font-weight="700">Escalate</text>
    <text x="548" y="136" fill="#8A97A6" font-size="12.5">one rung on fail,</text>
    <text x="548" y="155" fill="#8A97A6" font-size="12.5">budget-capped</text>
  </g>
  <line x1="740" y1="121" x2="770" y2="121" stroke="#3a4a5e" stroke-width="1.8" marker-end="url(#w-arw)"/>

  <!-- 4 Learn -->
  <g>
    <rect x="772" y="66" width="192" height="110" rx="14" fill="#10151d" stroke="#5EEACB" stroke-width="1.6"/>
    <circle cx="804" cy="98" r="15" fill="#5EEACB"/>
    <text x="804" y="103" text-anchor="middle" fill="#04140f" font-size="14" font-weight="800">4</text>
    <text x="830" y="103" fill="#E6EDF3" font-size="17" font-weight="700">Learn</text>
    <text x="794" y="136" fill="#8A97A6" font-size="12.5">outcomes tune the</text>
    <text x="794" y="155" fill="#8A97A6" font-size="12.5">serve threshold</text>
  </g>

  <!-- learn loops back to route -->
  <path d="M868 176 L868 210 L140 210 L140 178" fill="none" stroke="#19E3B1" stroke-width="1.5" stroke-dasharray="3 4" marker-end="url(#w-arm)"/>
  <text x="500" y="205" text-anchor="middle" fill="#19E3B1" font-size="11.5" font-weight="600">self-tuning — no retraining, ever</text>
</svg>

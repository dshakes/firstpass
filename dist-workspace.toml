[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Installers to generate for each app. shell + powershell are self-contained
# (download the binary from the GitHub Release, no external account). homebrew
# and npm additionally auto-publish to a tap / the npm registry at release time
# — that push is gated on operator secrets that do NOT exist yet:
#   homebrew → a tap repo (dshakes/homebrew-firstpass) + HOMEBREW_TAP_TOKEN secret
#   npm      → an owned @firstpass scope + NPM_TOKEN secret
# The formula/package are still generated as release artifacts regardless; only
# the registry push needs the secrets. See docs/runbooks/release.md.
installers = ["shell", "powershell", "homebrew", "npm"]
# Homebrew tap repo the formula is pushed to (must be created before a release).
tap = "dshakes/homebrew-firstpass"
# npm scope for the installer package (must be owned before `npm publish`).
npm-scope = "@firstpass"
publish-jobs = ["homebrew", "npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

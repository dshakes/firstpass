<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>How Firstpass works: route to the cheapest model, gate its real output, and escalate one rung only on failure — sealing a tamper-evident receipt. A cheap model fails the gate, one rung of escalation passes, the output is served, and every decision is written to a hash-chained audit trace.</title>
  <defs>
    <marker id="aM" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#5a6f82"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#19E3B1"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#FF5C5C"/></marker>
    <marker id="aA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#F5A623"/></marker>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.45"/></filter>
    <filter id="gl" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect x="1" y="1" width="998" height="428" rx="18" fill="#0B0E14" stroke="#263449"/>

  <!-- step headers -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <g><circle cx="52" cy="52" r="13" fill="none" stroke="#19E3B1" stroke-width="1.5"/><text x="52" y="57" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">1</text>
       <text x="76" y="57" font-size="14.5" font-weight="700" fill="#E6EDF3">Route</text><text x="140" y="57" font-size="12" fill="#8A97A6">cheapest first</text></g>
    <g><circle cx="452" cy="52" r="13" fill="none" stroke="#19E3B1" stroke-width="1.5"/><text x="452" y="57" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">2</text>
       <text x="476" y="57" font-size="14.5" font-weight="700" fill="#E6EDF3">Gate</text><text x="530" y="57" font-size="12" fill="#8A97A6">test the real output</text></g>
    <g><circle cx="712" cy="52" r="13" fill="none" stroke="#19E3B1" stroke-width="1.5"/><text x="712" y="57" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">3</text>
       <text x="736" y="57" font-size="14.5" font-weight="700" fill="#E6EDF3">Escalate &amp; seal</text><text x="892" y="57" font-size="12" fill="#8A97A6">only on fail</text></g>
  </g>

  <!-- Rung 1 (escalation target, directly above GATE) -->
  <g filter="url(#sh)"><rect x="440" y="100" width="190" height="56" rx="12" fill="#141d2a" stroke="#F5A623" stroke-width="1.5"/></g>
  <text x="535" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#E6EDF3">Rung 1</text>
  <text x="535" y="142" text-anchor="middle" font-size="11" fill="#F5A623" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">more capable model</text>

  <!-- main lane (boxes, y-center 252) -->
  <g filter="url(#sh)"><rect x="40" y="222" width="130" height="60" rx="12" fill="#141d2a" stroke="#2b3f52"/></g>
  <text x="105" y="257" text-anchor="middle" font-size="14" font-weight="600" fill="#E6EDF3">Request</text>

  <g filter="url(#sh)"><rect x="210" y="222" width="190" height="60" rx="12" fill="#141d2a" stroke="#2b3f52"/></g>
  <text x="305" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#E6EDF3">Rung 0</text>
  <text x="305" y="267" text-anchor="middle" font-size="11" fill="#19E3B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">cheapest model</text>

  <g filter="url(#sh)"><rect x="440" y="222" width="190" height="60" rx="12" fill="#141d2a" stroke="#3a4a61" stroke-width="1.5"/></g>
  <text x="535" y="247" text-anchor="middle" font-size="14" font-weight="700" fill="#E6EDF3" letter-spacing="1.5">GATE</text>
  <text x="535" y="267" text-anchor="middle" font-size="10.5" fill="#8A97A6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">tests · type · schema · judge</text>

  <g filter="url(#sh)"><rect x="800" y="222" width="160" height="60" rx="12" fill="#0e211d" stroke="#19E3B1" stroke-width="1.5"/></g>
  <text x="880" y="257" text-anchor="middle" font-size="14.5" font-weight="700" fill="#19E3B1">Served ✓</text>

  <!-- flow connectors: marching-ant dashes (animate on GitHub via <img>) -->
  <g stroke-width="2.5" fill="none">
    <path d="M170 252 L206 252" stroke="#5a6f82" stroke-dasharray="7 6" marker-end="url(#aM)"><animate attributeName="stroke-dashoffset" values="13;0" dur="0.7s" repeatCount="indefinite"/></path>
    <path d="M400 252 L436 252" stroke="#5a6f82" stroke-dasharray="7 6" marker-end="url(#aM)"><animate attributeName="stroke-dashoffset" values="13;0" dur="0.7s" repeatCount="indefinite"/></path>
    <path d="M630 252 L796 252" stroke="#19E3B1" stroke-dasharray="7 6" marker-end="url(#aG)"><animate attributeName="stroke-dashoffset" values="13;0" dur="0.7s" repeatCount="indefinite"/></path>
  </g>
  <g><rect x="672" y="230" width="66" height="22" rx="6" fill="#0e211d" stroke="#19E3B1" stroke-opacity="0.55"/>
     <text x="705" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#19E3B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">✓ pass</text></g>

  <!-- vertical escalation loop between GATE and Rung 1 (no crossing) -->
  <path d="M500 220 L500 158" fill="none" stroke="#FF5C5C" stroke-width="2.2" marker-end="url(#aR)"/>
  <text x="492" y="196" text-anchor="end" font-size="11" font-weight="700" fill="#FF5C5C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">✗ fail</text>
  <path d="M570 158 L570 220" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aA)"><animate attributeName="stroke-dashoffset" values="9;0" dur="0.6s" repeatCount="indefinite"/></path>
  <text x="578" y="196" font-size="11" fill="#F5A623" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">retry</text>

  <!-- moving request packet along the main lane -->
  <circle r="5" fill="#38E8FF" filter="url(#gl)">
    <animateMotion dur="3.4s" repeatCount="indefinite" keyPoints="0;0.34;0.34;0.66;0.66;1" keyTimes="0;0.28;0.42;0.62;0.74;1" calcMode="linear"
      path="M105 252 L305 252 L535 252 L880 252"/>
    <animate attributeName="fill" values="#38E8FF;#38E8FF;#FF5C5C;#F5A623;#19E3B1;#19E3B1" keyTimes="0;0.28;0.42;0.62;0.74;1" dur="3.4s" repeatCount="indefinite"/>
  </circle>

  <!-- served -> audit -->
  <path d="M880 282 L880 320" fill="none" stroke="#2b3f52" stroke-width="2" marker-end="url(#aM)"/>

  <!-- audit trace bar -->
  <g filter="url(#sh)"><rect x="34" y="330" width="932" height="66" rx="12" fill="#0d141b" stroke="#263449"/></g>
  <text x="54" y="357" font-size="11" letter-spacing="1.5" fill="#8A97A6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">AUDIT TRACE — tamper-evident, re-derivable</text>
  <text x="54" y="380" font-size="11.5" fill="#6f8385" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rung 0 · haiku · <tspan fill="#FF5C5C">FAIL</tspan> · $0.0007 &#160;&#8594;&#160; rung 1 · sonnet · <tspan fill="#19E3B1">PASS</tspan> · $0.0121 &#160;&#8594;&#160; <tspan fill="#19E3B1">served · saved 73%</tspan></text>
  <g>
    <rect x="706" y="349" width="244" height="30" rx="8" fill="#0e211d" stroke="#1c4b40"/>
    <circle cx="728" cy="364" r="4" fill="#19E3B1"><animate attributeName="opacity" values="1;.35;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="746" cy="364" r="4" fill="#19E3B1"><animate attributeName="opacity" values="1;.35;1" dur="1.6s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="764" cy="364" r="4" fill="#19E3B1"><animate attributeName="opacity" values="1;.35;1" dur="1.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <text x="784" y="368" font-size="11" font-weight="700" fill="#19E3B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">hash-chain verified ✓</text>
  </g>
</svg>

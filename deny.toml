# cargo-deny configuration (SPEC §7.3): license + advisory gate in CI.
[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses only. Anything copyleft or unknown fails CI and must be reviewed.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    # Permissive data license used by webpki-roots (the Mozilla CA certificate bundle).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by path (no version) — don't flag those as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

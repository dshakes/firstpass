<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet">
  <title>Firstpass routing pipeline: escalate one rung only when the gate fails, serve the first output that passes</title>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3A4A61"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F5A623"/>
    </marker>
  </defs>

  <rect x="1.5" y="1.5" width="997" height="457" rx="16" fill="#0B0E14" stroke="#263449" stroke-width="1"/>

  <!-- connectors -->
  <path d="M160,250 L214,250" fill="none" stroke="#3A4A61" stroke-width="2.5" marker-end="url(#arrowMuted)"/>
  <path d="M400,250 L454,250" fill="none" stroke="#3A4A61" stroke-width="2.5" marker-end="url(#arrowMuted)"/>
  <path d="M640,250 L694,250" fill="none" stroke="#3A4A61" stroke-width="2.5" marker-end="url(#arrowMuted)"/>

  <!-- escalate connector: gate -> rung1 -->
  <path d="M520,200 C520,150 380,150 316,124" fill="none" stroke="#263449" stroke-width="2.5" marker-end="url(#arrowMuted)">
    <animate attributeName="stroke" calcMode="discrete"
      keyTimes="0;0.499;0.50;0.629;0.63;1"
      values="#263449;#263449;#F5A623;#F5A623;#263449;#263449"
      dur="7s" repeatCount="indefinite"/>
  </path>
  <!-- return connector: rung1 -> gate -->
  <path d="M304,120 C240,168 480,196 522,204" fill="none" stroke="#263449" stroke-width="2.5" marker-end="url(#arrowMuted)"/>

  <!-- rung 1 node (escalation target) -->
  <g>
    <rect x="220" y="60" width="180" height="60" rx="12" fill="#121A26" stroke="#263449" stroke-width="1.5" filter="url(#cardShadow)">
      <animate attributeName="stroke" calcMode="discrete"
        keyTimes="0;0.629;0.63;0.699;0.70;1"
        values="#263449;#263449;#F5A623;#F5A623;#263449;#263449"
        dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="310" y="80" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600" fill="#E6EDF3">Rung 1</text>
    <text x="310" y="96" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" fill="#8A97A6">next model</text>
  </g>

  <!-- request node -->
  <g>
    <rect x="20" y="200" width="140" height="60" rx="12" fill="#121A26" stroke="#263449" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="90" y="222" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600" fill="#E6EDF3">Request</text>
  </g>

  <!-- rung 0 node -->
  <g>
    <rect x="220" y="200" width="180" height="60" rx="12" fill="#121A26" stroke="#263449" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="310" y="218" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600" fill="#E6EDF3">Rung 0</text>
    <text x="310" y="234" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" fill="#8A97A6">cheapest model</text>
  </g>

  <!-- gate node -->
  <g>
    <rect id="gateRect" x="460" y="200" width="180" height="60" rx="12" fill="#121A26" stroke="#263449" stroke-width="2" filter="url(#cardShadow)">
      <animate attributeName="stroke" calcMode="discrete"
        keyTimes="0;0.349;0.35;0.499;0.50;0.829;0.83;0.929;0.93;1"
        values="#263449;#263449;#FF5C5C;#FF5C5C;#263449;#263449;#19E3B1;#19E3B1;#263449;#263449"
        dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="550" y="217" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" fill="#E6EDF3" letter-spacing="1">GATE</text>
    <text x="550" y="233" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#8A97A6">tests · type · schema · judge</text>
  </g>

  <!-- fail chip -->
  <g opacity="0">
    <animate attributeName="opacity" calcMode="discrete"
      keyTimes="0;0.349;0.35;0.499;0.50;1" values="0;0;1;1;0;0" dur="7s" repeatCount="indefinite"/>
    <rect x="514" y="168" width="72" height="24" rx="6" fill="#FF5C5C" fill-opacity="0.15" stroke="#FF5C5C" stroke-width="1.25"/>
    <text x="550" y="184" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#FF5C5C">FAIL</text>
  </g>

  <!-- pass chip -->
  <g opacity="0">
    <animate attributeName="opacity" calcMode="discrete"
      keyTimes="0;0.829;0.83;0.929;0.93;1" values="0;0;1;1;0;0" dur="7s" repeatCount="indefinite"/>
    <rect x="508" y="168" width="84" height="24" rx="6" fill="#19E3B1" fill-opacity="0.15" stroke="#19E3B1" stroke-width="1.25"/>
    <text x="550" y="184" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#19E3B1">PASS ✓</text>
  </g>

  <!-- served node -->
  <g>
    <rect x="700" y="200" width="160" height="60" rx="12" fill="#121A26" stroke="#263449" stroke-width="1.5" filter="url(#cardShadow)">
      <animate attributeName="stroke" calcMode="discrete"
        keyTimes="0;0.949;0.95;1" values="#263449;#263449;#19E3B1;#263449" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="780" y="222" text-anchor="middle" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600" fill="#19E3B1">Served ✓</text>
  </g>

  <!-- audit trace bar -->
  <g>
    <rect x="20" y="400" width="840" height="40" rx="8" fill="#121A26" stroke="#263449" stroke-width="1.25"/>
    <text x="34" y="424" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#8A97A6" letter-spacing="1">AUDIT TRACE</text>
    <circle cx="640" cy="420" r="3.5" fill="#19E3B1" opacity="0.45"/>
    <circle cx="660" cy="420" r="3.5" fill="#19E3B1" opacity="0.45"/>
    <g opacity="0">
      <animate attributeName="opacity" calcMode="discrete"
        keyTimes="0;0.959;0.96;0.999;1" values="0;0;1;1;0" dur="7s" repeatCount="indefinite"/>
      <circle cx="780" cy="420" r="4" fill="#19E3B1" filter="url(#glow)"/>
    </g>
  </g>

  <!-- traveling request token -->
  <g filter="url(#glow)">
    <rect x="-17" y="-9" width="34" height="18" rx="9" fill="#121A26" stroke="#19E3B1" stroke-width="1.5"/>
    <circle cx="-8" cy="0" r="3" fill="#19E3B1"/>
    <animateMotion
      dur="7s" repeatCount="indefinite" calcMode="linear"
      keyPoints="0;0.103;0.103;0.269;0.269;0.490;0.490;0.710;0.710;0.869;1"
      keyTimes="0;0.09;0.20;0.35;0.50;0.63;0.70;0.83;0.93;0.97;1"
      path="M90,250 L310,250 L550,250 C550,172 380,172 310,112 C240,190 480,218 550,250 L780,250 L780,420"/>
  </g>
</svg>

name: python-wheels
# Build Firstpass as Python wheels so `pip install firstpass` and `uvx firstpass`
# work without a Rust toolchain — the same maturin `bindings = "bin"` model ruff
# and uv use. Wheels are built from crates/firstpass-proxy/pyproject.toml on every
# v* tag. Publishing to PyPI runs ONLY when the PYPI_API_TOKEN secret exists, so a
# tag still produces wheel artifacts before the token is set (no failing job).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest,   target: aarch64-apple-darwin }
          - { runner: macos-13,       target: x86_64-apple-darwin }
          - { runner: ubuntu-22.04,   target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-22.04,   target: aarch64-unknown-linux-gnu }
          - { runner: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/firstpass-proxy
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/firstpass-proxy/dist/*.whl

  publish:
    name: publish to PyPI
    needs: wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@v5
      - name: Publish (skipped until PYPI_API_TOKEN is set)
        if: ${{ env.PYPI_API_TOKEN != '' }}
        run: uv publish dist/*.whl
        env:
          UV_PUBLISH_TOKEN: ${{ env.PYPI_API_TOKEN }}

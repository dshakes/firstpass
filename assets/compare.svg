<svg viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Prediction versus proof: predictive routers guess before generation and never check; Firstpass gates the real output and escalates only on failure, emitting a signed receipt</title>
  <defs>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="1.5" y="1.5" width="997" height="377" rx="16" fill="#0B0E14" stroke="#263449"/>

  <!-- ── LEFT: prediction ── -->
  <g>
    <rect x="26" y="26" width="452" height="328" rx="12" fill="#12100F" stroke="#3a2626"/>
    <circle cx="50" cy="54" r="5" fill="#FF5C5C"/>
    <text x="66" y="59" font-size="15" font-weight="700" fill="#E6EDF3">Prediction</text>
    <text x="66" y="79" font-size="12.5" fill="#8A97A6">the status quo — decide before generation</text>

    <!-- pipeline chips -->
    <g font-size="13" font-weight="600" fill="#E6EDF3">
      <rect x="50" y="104" width="120" height="40" rx="9" fill="#1b1414" stroke="#3a2626"/><text x="110" y="129" text-anchor="middle">prompt</text>
      <rect x="192" y="104" width="120" height="40" rx="9" fill="#1b1414" stroke="#3a2626"/><text x="252" y="129" text-anchor="middle" fill="#c9b8b8">guess model</text>
      <rect x="334" y="104" width="120" height="40" rx="9" fill="#1b1414" stroke="#3a2626"/><text x="394" y="129" text-anchor="middle">send</text>
      <g stroke="#5a4444" stroke-width="2" fill="none"><path d="M170 124 h20" marker-end="url(#ar)"/><path d="M312 124 h20" marker-end="url(#ar)"/></g>
    </g>

    <!-- black box -->
    <rect x="50" y="176" width="404" height="86" rx="10" fill="#160f0f" stroke="#3a2626" stroke-dasharray="5 4"/>
    <text x="252" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#c9b8b8">no check on the actual output</text>
    <text x="252" y="236" text-anchor="middle" font-size="12.5" fill="#8A97A6">wrong guess ships anyway · you find out downstream, if ever</text>

    <g font-size="12.5" fill="#a58888">
      <text x="50" y="298">✗ no receipt — nothing to audit</text>
      <text x="50" y="322">✗ new model = retrain the policy</text>
    </g>
  </g>

  <!-- ── RIGHT: proof ── -->
  <g>
    <rect x="522" y="26" width="452" height="328" rx="12" fill="#0c1614" stroke="#1c4b40"/>
    <circle cx="546" cy="54" r="5" fill="#19E3B1" filter="url(#g)"/>
    <text x="562" y="59" font-size="15" font-weight="700" fill="#E6EDF3">Proof <tspan fill="#19E3B1">— Firstpass</tspan></text>
    <text x="562" y="79" font-size="12.5" fill="#8A97A6">gate the real output, then serve</text>

    <g font-size="13" font-weight="600" fill="#E6EDF3">
      <rect x="546" y="104" width="94" height="40" rx="9" fill="#0e211d" stroke="#1c4b40"/><text x="593" y="129" text-anchor="middle">cheapest</text>
      <rect x="660" y="104" width="94" height="40" rx="9" fill="#0e211d" stroke="#1c4b40"/><text x="707" y="129" text-anchor="middle" fill="#19E3B1">gate</text>
      <rect x="774" y="104" width="94" height="40" rx="9" fill="#0e211d" stroke="#1c4b40"/><text x="821" y="129" text-anchor="middle">serve</text>
      <g stroke="#2a6b5c" stroke-width="2" fill="none"><path d="M640 124 h20" marker-end="url(#am)"/><path d="M754 124 h20" marker-end="url(#am)"/></g>
    </g>
    <!-- escalate loop -->
    <path d="M707 104 C707 92 707 90 726 90 L810 90 C829 90 829 98 829 104" fill="none" stroke="#F5A623" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aa)"/>
    <text x="768" y="85" text-anchor="middle" font-size="10" fill="#F5A623" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">escalate 1 rung on fail</text>

    <!-- verified output -->
    <rect x="546" y="176" width="404" height="86" rx="10" fill="#0e211d" stroke="#1c4b40"/>
    <text x="748" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">served only after a real gate passes</text>
    <text x="748" y="230" text-anchor="middle" font-size="12.5" fill="#8A97A6">tests · typecheck · schema · fresh-context judge</text>

    <g font-size="12.5" fill="#7fcfbc">
      <text x="546" y="298">✓ tamper-evident receipt for every decision</text>
      <text x="546" y="322">✓ new model = one line in the ladder, no retrain</text>
    </g>
  </g>

  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0 0 L6 3.5 L0 7 z" fill="#5a4444"/></marker>
    <marker id="am" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0 0 L6 3.5 L0 7 z" fill="#2a6b5c"/></marker>
    <marker id="aa" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0 0 L6 3.5 L0 7 z" fill="#F5A623"/></marker>
  </defs>
</svg>

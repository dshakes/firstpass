<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>Firstpass — cheap until proven otherwise. It routes every request to the cheapest model, gates the real output, escalates only on proof of need, and cuts your AI bill from four dollar signs to one at the same quality, with a distribution-free guarantee of at most 10 percent wrong answers served at 95 percent confidence and a signed receipt every call.</title>
  <defs>
    <linearGradient id="h-mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEACB"/><stop offset="1" stop-color="#19E3B1"/>
    </linearGradient>
    <radialGradient id="h-haze" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#19E3B1" stop-opacity="0.16"/><stop offset="1" stop-color="#19E3B1" stop-opacity="0"/>
    </radialGradient>
    <filter id="h-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="h-arw" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0 0 L8 5 L0 10 Z" fill="url(#h-mint)"/></marker>
  </defs>

  <rect x="1.5" y="1.5" width="997" height="357" rx="18" fill="#0B0E14" stroke="#243244"/>
  <ellipse cx="640" cy="150" rx="420" ry="180" fill="url(#h-haze)"/>

  <!-- brand + wedge -->
  <g transform="translate(36,40)">
    <rect x="0" y="-20" width="27" height="27" rx="7" fill="#19E3B1"/>
    <path d="M6 -3 L12 -12 L16 -8 L22 -16" fill="none" stroke="#04140f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="37" y="1" font-size="20" font-weight="800" fill="#E6EDF3" letter-spacing="-.4">firstpass</text>
  </g>
  <text x="36" y="72" font-size="14" font-weight="600" fill="#19E3B1" letter-spacing="0.3">Cheap until proven otherwise.</text>

  <!-- money motif -->
  <text x="70" y="130" font-size="12" font-weight="700" fill="#8A97A6" letter-spacing="2">YOUR AI BILL</text>
  <text x="62" y="232" font-size="96" font-weight="900" fill="#3d4653">$$$$</text>
  <line x1="52" y1="200" x2="330" y2="200" stroke="#FF5C5C" stroke-width="7" stroke-linecap="round" transform="rotate(-7 191 200)"/>

  <path d="M360 196 L452 196" stroke="url(#h-mint)" stroke-width="9" stroke-linecap="round" marker-end="url(#h-arw)"/>

  <text x="498" y="238" font-size="128" font-weight="900" fill="url(#h-mint)" filter="url(#h-glow)">$</text>

  <!-- verified badge -->
  <g transform="translate(636,110)">
    <path d="M64 0 L120 20 L120 78 C120 116 92 140 64 150 C36 140 8 116 8 78 L8 20 Z" fill="#0c1614" stroke="#19E3B1" stroke-width="3"/>
    <path d="M38 74 L58 94 L94 50" fill="none" stroke="#19E3B1" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="784" y="176" font-size="23" font-weight="900" fill="#E6EDF3">PROVEN,</text>
  <text x="784" y="205" font-size="23" font-weight="900" fill="#E6EDF3">not</text>
  <text x="838" y="205" font-size="23" font-weight="900" fill="#19E3B1">guessed</text>

  <!-- trust strip -->
  <line x1="36" y1="278" x2="964" y2="278" stroke="#1B2636"/>
  <g font-size="13" font-weight="600">
    <circle cx="60" cy="313" r="4" fill="#19E3B1"/>
    <text x="74" y="318" fill="#E6EDF3">&#8804;10% wrong answers served <tspan fill="#8A97A6" font-weight="400">@ 95% confidence</tspan></text>
    <circle cx="430" cy="313" r="4" fill="#19E3B1"/>
    <text x="444" y="318" fill="#E6EDF3">82% served from the cheap tier</text>
    <circle cx="738" cy="313" r="4" fill="#19E3B1"/>
    <text x="752" y="318" fill="#E6EDF3">a signed receipt <tspan fill="#8A97A6" font-weight="400">every call</tspan></text>
  </g>
</svg>

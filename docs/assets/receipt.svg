  <text x="90" y="356" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#8A97A6">total</text>
  <text x="630" y="356" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#E6EDF3">$0.0128</text>
  <text x="90" y="380" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#8A97A6">vs baseline (always-top-tier)</text>
  <text x="630" y="380" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#8A97A6">$0.0630</text>

  <line x1="90" y1="400" x2="630" y2="400" stroke="#263449" stroke-width="1"/>


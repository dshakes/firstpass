<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>How Firstpass works: 1) route to the cheapest model, 2) gate its real output, 3) escalate one rung only on failure and seal a tamper-evident receipt. A cheap model fails the gate, one rung of escalation passes, the output is served, and every decision is written to a hash-chained audit trace.</title>
  <defs>
    <marker id="aM" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#4a5f74"/></marker>
    <marker id="aG" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#19E3B1"/></marker>
    <marker id="aR" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#FF5C5C"/></marker>
    <marker id="aA" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#F5A623"/></marker>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect x="1" y="1" width="998" height="428" rx="18" fill="#0B0E14" stroke="#263449"/>

  <!-- step headers -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <g><circle cx="52" cy="54" r="13" fill="none" stroke="#19E3B1" stroke-width="1.5"/><text x="52" y="59" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">1</text>
       <text x="76" y="59" font-size="14.5" font-weight="700" fill="#E6EDF3">Route</text><text x="140" y="59" font-size="12" fill="#8A97A6">cheapest rung first</text></g>
    <g><circle cx="392" cy="54" r="13" fill="none" stroke="#19E3B1" stroke-width="1.5"/><text x="392" y="59" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">2</text>
       <text x="416" y="59" font-size="14.5" font-weight="700" fill="#E6EDF3">Gate</text><text x="470" y="59" font-size="12" fill="#8A97A6">test the real output</text></g>
    <g><circle cx="700" cy="54" r="13" fill="none" stroke="#19E3B1" stroke-width="1.5"/><text x="700" y="59" text-anchor="middle" font-size="14" font-weight="700" fill="#19E3B1">3</text>
       <text x="724" y="59" font-size="14.5" font-weight="700" fill="#E6EDF3">Escalate &amp; seal</text><text x="878" y="59" font-size="12" fill="#8A97A6">only on fail</text></g>
  </g>

  <!-- Rung 1 (escalation target, top) -->
  <g filter="url(#sh)"><rect x="300" y="120" width="200" height="58" rx="12" fill="#141d2a" stroke="#F5A623" stroke-width="1.5"/></g>
  <text x="400" y="145" text-anchor="middle" font-size="14.5" font-weight="700" fill="#E6EDF3">Rung 1</text>
  <text x="400" y="164" text-anchor="middle" font-size="11.5" fill="#F5A623" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">more capable model</text>

  <!-- main lane y=250 -->
  <!-- Request -->
  <g filter="url(#sh)"><rect x="34" y="222" width="130" height="58" rx="12" fill="#141d2a" stroke="#2b3f52"/></g>
  <text x="99" y="256" text-anchor="middle" font-size="14" font-weight="600" fill="#E6EDF3">Request</text>

  <!-- Rung 0 -->
  <g filter="url(#sh)"><rect x="214" y="222" width="200" height="58" rx="12" fill="#141d2a" stroke="#2b3f52"/></g>
  <text x="314" y="247" text-anchor="middle" font-size="14" font-weight="600" fill="#E6EDF3">Rung 0</text>
  <text x="314" y="266" text-anchor="middle" font-size="11.5" fill="#19E3B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">cheapest model</text>

  <!-- Gate -->
  <g filter="url(#sh)"><rect x="470" y="222" width="200" height="58" rx="12" fill="#141d2a" stroke="#3a4a61" stroke-width="1.5"/></g>
  <text x="570" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#E6EDF3" letter-spacing="1.5">GATE</text>
  <text x="570" y="265" text-anchor="middle" font-size="10.5" fill="#8A97A6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">tests · type · schema · judge</text>

  <!-- Served -->
  <g filter="url(#sh)"><rect x="820" y="222" width="146" height="58" rx="12" fill="#0e211d" stroke="#19E3B1" stroke-width="1.5"/></g>
  <text x="893" y="256" text-anchor="middle" font-size="14.5" font-weight="700" fill="#19E3B1">Served ✓</text>

  <!-- connectors: request -> rung0 -> gate -->
  <path d="M164 251 L206 251" fill="none" stroke="#4a5f74" stroke-width="2.5" marker-end="url(#aM)"/>
  <path d="M414 251 L462 251" fill="none" stroke="#4a5f74" stroke-width="2.5" marker-end="url(#aM)"/>

  <!-- FAIL: gate up to rung1 (escalate) -->
  <path d="M540 222 C540 196 460 178 500 160" fill="none" stroke="#FF5C5C" stroke-width="2.2" marker-end="url(#aR)"/>
  <g><rect x="470" y="188" width="150" height="22" rx="6" fill="#1a1213" stroke="#FF5C5C" stroke-opacity="0.5"/>
     <text x="545" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#FF5C5C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">✗ fail → escalate</text></g>
  <!-- rung1 retries the gate -->
  <path d="M320 178 C300 210 360 226 460 240" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aA)"/>
  <text x="330" y="214" font-size="10.5" fill="#F5A623" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">retry gate</text>

  <!-- PASS: gate -> served -->
  <path d="M670 251 L812 251" fill="none" stroke="#19E3B1" stroke-width="2.5" marker-end="url(#aG)"/>
  <g><rect x="700" y="220" width="82" height="22" rx="6" fill="#0e211d" stroke="#19E3B1" stroke-opacity="0.5"/>
     <text x="741" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#19E3B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">✓ pass</text></g>

  <!-- receipt / audit trace -->
  <path d="M893 280 L893 320" fill="none" stroke="#2b3f52" stroke-width="2" marker-end="url(#aM)"/>
  <g filter="url(#sh)"><rect x="34" y="330" width="932" height="66" rx="12" fill="#0d141b" stroke="#263449"/></g>
  <text x="54" y="357" font-size="11" letter-spacing="1.5" fill="#8A97A6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">AUDIT TRACE — tamper-evident, re-derivable</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6f8385">
    <text x="54" y="380">rung 0 · haiku · <tspan fill="#FF5C5C">FAIL</tspan> · $0.0007</text>
    <text x="250" y="380">→</text>
    <text x="272" y="380">rung 1 · sonnet · <tspan fill="#19E3B1">PASS</tspan> · $0.0121</text>
    <text x="486" y="380">→</text>
    <text x="508" y="380" fill="#19E3B1">served · saved 73%</text>
  </g>
  <!-- hash chain links -->
  <g>
    <rect x="720" y="352" width="230" height="30" rx="8" fill="#0e211d" stroke="#1c4b40"/>
    <circle cx="742" cy="367" r="4" fill="#19E3B1"/><circle cx="762" cy="367" r="4" fill="#19E3B1"/><circle cx="782" cy="367" r="4" fill="#19E3B1"/>
    <text x="800" y="371" font-size="11" font-weight="700" fill="#19E3B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">hash-chain verified ✓</text>
  </g>
</svg>

<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet">
  <title>Firstpass audit receipt — tamper-evident trace of a cheapest-first, gate-verified routing decision</title>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>

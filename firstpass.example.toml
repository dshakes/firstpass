# Firstpass routing config — copy to `firstpass.toml`, point FIRSTPASS_CONFIG at it.
#
#   FIRSTPASS_MODE=enforce FIRSTPASS_CONFIG=./firstpass.toml \
#   cargo run -p firstpass-proxy
#
# Routes are matched top-to-bottom; the first match wins. Each route binds a slice
# of traffic to a mode, a model ladder (cheapest first), and the gates that must pass.

# Providers a ladder can route to. `anthropic` and `openai` are built in; declare a `[[provider]]`
# for anything else. Any OpenAI-compatible endpoint — Groq, Together, Fireworks, DeepSeek, Mistral,
# xAI, OpenRouter, Azure, or a local Ollama / vLLM server — is one entry, no rebuild. A ladder rung
# then reads `<id>/<model>`, so you can start a rung on a cheap open-source model and escalate to a
# frontier model only when the gate fails. `dialect` is `openai`, `anthropic`, or `gemini`;
# `api_key_env` names the env var holding that provider's key (omit for a keyless local endpoint).
# [[provider]]
# id = "groq"
# dialect = "openai"
# base_url = "https://api.groq.com/openai"
# api_key_env = "GROQ_API_KEY"
#
# [[provider]]
# id = "ollama"                       # local, open-source models — no key needed
# dialect = "openai"
# base_url = "http://localhost:11434"
#
# [[provider]]
# id = "gemini"                       # Google Gemini (its own dialect; key via x-goog-api-key)
# dialect = "gemini"
# base_url = "https://generativelanguage.googleapis.com"
# api_key_env = "GEMINI_API_KEY"
#
# `auth` is a separate axis from `dialect` (ADR 0006): it picks how the request is credentialed.
# Bedrock and Vertex both speak the Anthropic body shape but need bespoke request signing/tokens
# instead of a header API key — set `auth`, not `dialect`, to get them.
#
# [[provider]]
# id = "bedrock"                       # Claude on AWS Bedrock — SigV4-signed, no api_key_env
# dialect = "anthropic"
# auth = "aws_sigv4"
# region = "us-east-1"
# # Credentials come from the standard AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / (optional)
# # AWS_SESSION_TOKEN env vars — never put in config or the URL.
#
# [[provider]]
# id = "vertex"                        # Claude on Google Vertex AI — OAuth2 bearer, no api_key_env
# dialect = "anthropic"
# auth = "gcp_oauth"
# region = "us-central1"
# project = "my-gcp-project"
# # Token minted from GOOGLE_APPLICATION_CREDENTIALS (a service-account JSON key file) or the
# # ambient environment (gcloud ADC, GKE workload identity, …); cached and refreshed by gcp_auth.
#
# Then a ladder can open on an OSS rung and escalate to a frontier model on gate failure, or fail
# over across clouds for the same model:
#   ladder = ["ollama/llama-3.3-70b", "groq/llama-3.3-70b-versatile", "anthropic/claude-sonnet-5"]
#   ladder = ["bedrock/anthropic.claude-3-5-haiku-20241022-v1:0", "anthropic/claude-sonnet-5"]

[[route]]
match = { agent = "claude-code", subagent = ["test-runner", "explore"] }
mode  = "enforce"
ladder = ["anthropic/claude-haiku-4-5", "anthropic/claude-sonnet-5"]
gates  = ["non-empty", "judge"]

[[route]]
match = { task_kind = "code_edit" }
mode  = "enforce"
ladder = ["anthropic/claude-sonnet-5", "anthropic/claude-opus-4-8"]
gates  = ["json-valid", "unit-tests"]

[[route]]
match = {}
mode  = "observe"
ladder = ["anthropic/claude-opus-4-8"]

# Gates. Built-ins: `non-empty`, `json-valid`. Every other gate id is a `[[gate]]` below — any
# executable that receives the candidate as JSON on **stdin** (never argv) and prints
#   {"verdict":"pass|fail|abstain", "score"?: 0.0-1.0, "reason"?: "..."}
# on stdout (SPEC §8.1). This is how you bring your own test runner, linter, or LLM judge — no
# rebuild, just a command. Exit ≠ 0 or a timeout is treated as `abstain`.

[[gate]]
id  = "unit-tests"
cmd = ["your-test-runner", "--from-stdin"]

# A native LLM-judge gate: a separate model grades the candidate against a rubric. The runner
# enforces maker != checker (a model never grades its own output) and treats the candidate as data,
# not instructions. Use a judge model outside the route's ladder so it never grades its own output.
[[gate]]
id    = "judge"
judge = { model = "anthropic/claude-opus-4-8", threshold = 0.7, rubric = "The response fully and correctly resolves the request, with no errors." }

# A self-consistency uncertainty gate (Wang et al. 2022; Farquhar et al., Nature 2024): call the
# same model k times and score the candidate by agreement with the fresh samples. Pass iff the
# mean agreement score >= threshold. Unlike a judge gate, maker == checker is intentional here —
# self-consistency is definitionally self-referential.
#
# Cost: k extra model calls per request — that is the honest price of measured confidence.
# Suggested pairing: this gate on a cheap first-rung model + conformal `serve_threshold`
# calibration, so the agreement score feeds the threshold machinery and the frontier model is
# only reached when the cheap model disagrees with itself.
#
# [[gate]]
# id          = "uncertainty"
# consistency = { model = "anthropic/claude-haiku-4-5", k = 3, threshold = 0.6 }

[budget]
per_request_usd = 0.50
per_session_usd = 10.00
per_day_usd     = 250.00
on_exhausted    = "serve_best_attempt"

[escalation]
max_rungs_per_request = 3
session_promotion = { after_failures = 3, window = "30m" }
# Prefetch depth: fire this many rungs ahead concurrently, gating cheapest-first and serving the
# first pass (the served result is identical to serial — only latency drops and wasted speculative
# calls are paid for). 0 = serial (default). Raise it to cut worst-case escalation latency when the
# extra spend is acceptable.
speculation = 0
# Route tool-calling / multimodal / streaming requests through enforce instead of passing them
# through un-gated (ADR 0005). Off by default = byte-identical to observe fallback. Content
# round-trips verbatim and a streaming client is served the gated result as SSE. Turn this on ONLY
# after verifying enforce faithfully handles your tool workload live.
# enforce_structured = true
# Serve threshold: a rung is served iff its aggregate gate score >= this value. Omit to serve on a
# gate Pass (default, byte-identical).
# serve_threshold = 0.5
# Online/adaptive conformal (Gibbs-Candès ACI): when set, the serve threshold is tracked LIVE from
# /v1/feedback outcomes instead of held fixed — so served-failure stays at `alpha` even as the
# workload drifts. This is the self-tuning loop; omit for the fixed threshold above.
# [escalation.adaptive]
# alpha = 0.10   # target served-failure rate the loop holds to
# gamma = 0.02   # step size — larger tracks shift faster but noisier

<svg viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet">
  <title>Firstpass — the cheapest model takes the first pass, proven not guessed</title>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- self-contained ink card -->
  <rect x="1.5" y="1.5" width="997" height="237" rx="16" fill="#0B0E14" stroke="#263449" stroke-width="1"/>

  <!-- switch/junction mark -->
  <g>
    <!-- rail ties -->
    <g stroke="#1B2636" stroke-width="2" stroke-linecap="round">
      <line x1="38" y1="112" x2="38" y2="128"/>
      <line x1="54" y1="112" x2="54" y2="128"/>
      <line x1="70" y1="112" x2="70" y2="128"/>
      <line x1="86" y1="112" x2="86" y2="128"/>
    </g>
    <!-- entering track -->
    <path d="M28,120 L96,120" fill="none" stroke="#3A4A61" stroke-width="4" stroke-linecap="round"/>
    <!-- diverging track: not cleared -->
    <path d="M96,120 C122,120 132,132 154,148" fill="none" stroke="#263449" stroke-width="4" stroke-linecap="round"/>
    <!-- diverging track: cleared (signal-mint) -->
    <path d="M96,120 C122,120 132,108 154,92" fill="none" stroke="#19E3B1" stroke-width="4" stroke-linecap="round"/>
    <!-- shimmer traveling along entering track -->
    <circle r="3" fill="#5EEACB" opacity="0">
      <animateMotion path="M28,120 L96,120" dur="2.6s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <!-- junction signal -->
    <circle cx="96" cy="120" r="7" fill="#19E3B1" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.55;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="96" cy="120" r="3" fill="#0B0E14"/>
  </g>

  <!-- wordmark -->
  <text x="190" y="118" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="700">
    <tspan fill="#E6EDF3">First</tspan><tspan fill="#19E3B1">pass</tspan>
  </text>
  <text x="191" y="148" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" fill="#8A97A6">The cheapest model takes the first pass — proven, not guessed.</text>

  <!-- verdict motif -->
  <g>
    <circle cx="898" cy="204" r="6" fill="#19E3B1" filter="url(#glow)"/>
    <circle cx="924" cy="204" r="6" fill="#F5A623"/>
    <circle cx="950" cy="204" r="6" fill="#FF5C5C"/>
  </g>
</svg>

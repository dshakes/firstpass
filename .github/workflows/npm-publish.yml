name: npm-publish
# Publish the npm package via OIDC TRUSTED PUBLISHING — no token, no 2FA.
# cargo-dist generates the @dshakesnotbot/firstpass-proxy tarball as a release
# asset (npm is in `installers` but NOT `publish-jobs`); this job downloads it
# once the GitHub Release is published and pushes it to npm using the repo's OIDC
# identity.
#
# One-time npm setup (npmjs.com → the package → Trusted Publisher → GitHub Actions):
#   Organization or user : dshakes
#   Repository           : firstpass
#   Workflow filename    : npm-publish.yml
#   Environment name     : (leave blank)
#   Allowed actions      : npm publish
# Then the NPM_TOKEN secret can be deleted — OIDC replaces it.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.2)"
        required: true

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # Finals only — mirror cargo-dist (brew/npm skip prereleases). Dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Upgrade npm to an OIDC-capable version (>= 11.5.1)
        run: npm install -g npm@latest && npm --version
      - name: Download the npm package tarball from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*-npm-package.tar.gz' --dir .
          ls -la ./*-npm-package.tar.gz
      - name: Publish to npm
        # npm can't configure trusted publishing until the package EXISTS, so the
        # first publish needs a token (use a classic Automation token — it bypasses
        # 2FA). Once the package exists + a Trusted Publisher is configured, delete
        # the NPM_TOKEN secret and every future release publishes via OIDC (no token).
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TARBALL="$(ls ./*-npm-package.tar.gz)"
          if [ -n "$NPM_TOKEN" ]; then
            echo "bootstrap publish with NPM_TOKEN"
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          else
            echo "OIDC trusted publishing (no token)"
          fi
          npm publish "$TARBALL" --access public

[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Installers to generate for each app. shell + powershell are self-contained
# (download the binary from the GitHub Release, no external account). homebrew
# auto-publishes the formula to the tap. The npm package is GENERATED here but
# PUBLISHED by .github/workflows/npm-publish.yml via OIDC trusted publishing
# (no token, no 2FA) — so npm is intentionally NOT in publish-jobs below.
installers = ["shell", "powershell", "homebrew", "npm"]
# Homebrew tap repo the formula is pushed to (shared dshakes tap; already exists).
# Users install via `brew install dshakes/tap/firstpass`.
tap = "dshakes/homebrew-tap"
# npm scope for the installer package.
npm-scope = "@dshakesnotbot"
publish-jobs = ["homebrew"]
# Ship the self-updater so installed users can run `firstpass-proxy-update` (and
# `firstpass-update`) to pull the latest release — the built-in "upgrade" path.
install-updater = true
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
